
services:
  # ===== INFRASTRUCTURE =====
  postgres:
    image: postgres:16-alpine
    container_name: stockwise-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  redis:
    image: redis:7-alpine
    container_name: stockwise-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stockwise-rabbitmq
    ports:
      - "15672:15672" # Management UI
      - "5672:5672"   # RabbitMQ port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stockwise-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  # ===== APPLICATION SERVICES =====
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: stockwise-api-gateway
    ports:
      - "18080:8080"
    env_file: .env
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stockwise-net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: stockwise-user-service
    ports:
      - "127.0.0.1:18081:8081"
    env_file: .env
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockwise-net

  market-service:
    build:
      context: ./services/market-service
      dockerfile: Dockerfile
    container_name: stockwise-market-service
    ports:
      - "18082:8082"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stockwise-net

  portfolio-service:
    build:
      context: ./services/portfolio-service
      dockerfile: Dockerfile
    container_name: stockwise-portfolio-service
    ports:
      - "18083:8083"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stockwise-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: stockwise-ai-service
    ports:
      - "18000:8000"
    env_file: .env
    environment:
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - stockwise-net

  data-pipeline:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: stockwise-data-pipeline
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - stockwise-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockwise-frontend
    ports:
      - "13000:3000"
    env_file: .env
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - stockwise-net

networks:
  stockwise-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
