
services:
  # ===== INFRASTRUCTURE =====
  postgres:
    image: postgres:16-alpine
    container_name: stockwise-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  redis:
    image: redis:7-alpine
    container_name: stockwise-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: stockwise-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockwise-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: stockwise-kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - stockwise-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stockwise-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - stockwise-net

  # ===== APPLICATION SERVICES =====
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: stockwise-api-gateway
    ports:
      - "18080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - stockwise-net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: stockwise-user-service
    ports:
      - "18081:8081"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockwise-net

  market-service:
    build:
      context: ./services/market-service
      dockerfile: Dockerfile
    container_name: stockwise-market-service
    ports:
      - "18082:8082"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - stockwise-net

  portfolio-service:
    build:
      context: ./services/portfolio-service
      dockerfile: Dockerfile
    container_name: stockwise-portfolio-service
    ports:
      - "18083:8083"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - stockwise-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: stockwise-ai-service
    ports:
      - "18000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - stockwise-net

  data-pipeline:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: stockwise-data-pipeline
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - stockwise-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockwise-frontend
    ports:
      - "13000:3000"
    env_file: .env
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - stockwise-net

networks:
  stockwise-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
