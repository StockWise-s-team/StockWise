server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

user-service:
  url: ${USER_SERVICE_URL:http://user-service:8081}

market-service:
  url: ${MARKET_SERVICE_URL:http://market-service:8082}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:13000}

gateway:
  connect-timeout-ms: ${GATEWAY_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${GATEWAY_READ_TIMEOUT_MS:10000}
  write-timeout-ms: ${GATEWAY_WRITE_TIMEOUT_MS:10000}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRY_MS:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRY_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
