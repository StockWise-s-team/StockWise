server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

user-service:
  url: ${USER_SERVICE_URL:http://user-service:8081}

jwt:
  secret: ${JWT_SECRET:stockwise-dev-secret-key-change-in-production}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
